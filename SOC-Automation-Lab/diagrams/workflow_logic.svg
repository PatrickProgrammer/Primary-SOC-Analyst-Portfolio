<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="800" viewBox="0 0 1300 800" role="img" aria-label="SIEM SOAR architecture diagram">
<style>
  .bg { fill:#0b1020; }
  .card { fill:#111827; stroke:#334155; stroke-width:1.5; rx:18; }
  .card2 { fill:#0f172a; stroke:#475569; stroke-width:1.3; rx:16; }
  .title { fill:#f8fafc; font-family:Inter,Arial,sans-serif; font-size:26px; font-weight:700; }
  .subtitle { fill:#cbd5e1; font-family:Inter,Arial,sans-serif; font-size:15px; }
  .label { fill:#f8fafc; font-family:Inter,Arial,sans-serif; font-size:18px; font-weight:700; }
  .small { fill:#cbd5e1; font-family:Inter,Arial,sans-serif; font-size:13px; }
  .tiny { fill:#94a3b8; font-family:Inter,Arial,sans-serif; font-size:12px; }
  .accent { fill:#38bdf8; }
  .green { fill:#22c55e; }
  .yellow { fill:#f59e0b; }
  .red { fill:#ef4444; }
  .line { stroke:#38bdf8; stroke-width:3; fill:none; marker-end:url(#arrow); }
  .line2 { stroke:#94a3b8; stroke-width:2; fill:none; marker-end:url(#arrow2); stroke-dasharray:6 6; }
  .boundary { fill:none; stroke:#64748b; stroke-width:1.5; stroke-dasharray:8 8; rx:20; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/></marker>
  <marker id="arrow2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
</defs>
<rect class="bg" x="0" y="0" width="1300" height="800"/>
<text class="title" x="50" y="55">Alert decision workflow</text>
<text class="subtitle" x="50" y="82">The workflow reduces noise by escalating high-risk alerts and enriching medium-severity file events before ticket creation.</text>

<rect class="card" x="70" y="145" width="230" height="95" rx="18"/>
<circle class="accent" cx="98" cy="175" r="8"/>
<text class="label" x="118" y="181">1. Wazuh alert</text>
<text class="small" x="98" y="210">JSON payload sent to n8n webhook</text>
<path class="line" d="M300 195 C345 195, 355 195, 400 195"/>
<rect class="card" x="400" y="145" width="250" height="95" rx="18"/>
<circle class="green" cx="428" cy="175" r="8"/>
<text class="label" x="448" y="181">2. Normalize event</text>
<text class="small" x="428" y="210">Extract host, rule, user, process, hash and severity</text>
<path class="line" d="M650 195 C695 195, 705 195, 750 195"/>
<rect class="card" x="750" y="130" width="250" height="125" rx="18"/>
<circle class="yellow" cx="778" cy="160" r="8"/>
<text class="label" x="798" y="166">3. Severity gate</text>
<text class="small" x="778" y="195">High severity alerts are escalated directly</text>
<text class="small" x="778" y="215">Lower severity events require more context</text>
<path class="line" d="M1000 185 C1060 185, 1080 170, 1130 150"/>
<rect class="card2" x="1055" y="85" width="215" height="95" rx="18"/>
<circle class="red" cx="1083" cy="115" r="8"/>
<text class="label" x="1103" y="121">Critical ticket</text>
<text class="small" x="1083" y="150">Create Jira issue immediately</text>
<path class="line" d="M875 255 C875 310, 875 325, 875 375"/>
<rect class="card" x="750" y="375" width="250" height="100" rx="18"/>
<circle class="accent" cx="778" cy="405" r="8"/>
<text class="label" x="798" y="411">4. Hash exists?</text>
<text class="small" x="778" y="440">File hash present in alert telemetry</text>
<path class="line" d="M1000 425 C1060 425, 1095 410, 1130 390"/>
<rect class="card2" x="1055" y="335" width="215" height="100" rx="18"/>
<circle class="green" cx="1083" cy="365" r="8"/>
<text class="label" x="1103" y="371">No hash path</text>
<text class="small" x="1083" y="400">Document event context or suppress as low priority</text>
<path class="line" d="M875 475 C875 520, 875 530, 875 570"/>
<rect class="card" x="745" y="570" width="260" height="100" rx="18"/>
<circle class="red" cx="773" cy="600" r="8"/>
<text class="label" x="793" y="606">5. Threat enrichment</text>
<text class="small" x="773" y="635">Query VirusTotal with sanitized hash only</text>
<path class="line" d="M1005 620 C1065 620, 1090 625, 1130 650"/>
<rect class="card" x="1055" y="615" width="215" height="110" rx="18"/>
<circle class="yellow" cx="1083" cy="645" r="8"/>
<text class="label" x="1103" y="651">6. Ticket or suppress</text>
<text class="small" x="1083" y="680">Malicious result: create Jira ticket</text>
<text class="small" x="1083" y="700">Benign/no signal: suppress or monitor</text>
<text class="tiny" x="70" y="740">Primary design principle: analysts should spend time on events with evidence, not on repetitive manual enrichment.</text>
</svg>
