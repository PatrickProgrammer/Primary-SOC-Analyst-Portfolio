<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="650" viewBox="0 0 1300 650" role="img" aria-label="SIEM SOAR architecture diagram">
<style>
  .bg { fill:#0b1020; }
  .card { fill:#111827; stroke:#334155; stroke-width:1.5; rx:18; }
  .card2 { fill:#0f172a; stroke:#475569; stroke-width:1.3; rx:16; }
  .title { fill:#f8fafc; font-family:Inter,Arial,sans-serif; font-size:26px; font-weight:700; }
  .subtitle { fill:#cbd5e1; font-family:Inter,Arial,sans-serif; font-size:15px; }
  .label { fill:#f8fafc; font-family:Inter,Arial,sans-serif; font-size:18px; font-weight:700; }
  .small { fill:#cbd5e1; font-family:Inter,Arial,sans-serif; font-size:13px; }
  .tiny { fill:#94a3b8; font-family:Inter,Arial,sans-serif; font-size:12px; }
  .accent { fill:#38bdf8; }
  .green { fill:#22c55e; }
  .yellow { fill:#f59e0b; }
  .red { fill:#ef4444; }
  .line { stroke:#38bdf8; stroke-width:3; fill:none; marker-end:url(#arrow); }
  .line2 { stroke:#94a3b8; stroke-width:2; fill:none; marker-end:url(#arrow2); stroke-dasharray:6 6; }
  .boundary { fill:none; stroke:#64748b; stroke-width:1.5; stroke-dasharray:8 8; rx:20; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/></marker>
  <marker id="arrow2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
</defs>
<rect class="bg" x="0" y="0" width="1300" height="650"/>
<text class="title" x="50" y="55">Validation flow</text>
<text class="subtitle" x="50" y="82">Simulated techniques were used to validate alert generation, enrichment, filtering and ticket creation.</text>

<rect class="card" x="70" y="160" width="260" height="110" rx="18"/>
<circle class="red" cx="98" cy="190" r="8"/>
<text class="label" x="118" y="196">Atomic Red Team</text>
<text class="small" x="98" y="225">Generate controlled telemetry</text>
<text class="small" x="98" y="245">Validate realistic endpoint events</text>
<path class="line" d="M330 215 C390 215, 410 215, 470 215"/>
<rect class="card" x="470" y="160" width="260" height="110" rx="18"/>
<circle class="accent" cx="498" cy="190" r="8"/>
<text class="label" x="518" y="196">Wazuh detection</text>
<text class="small" x="498" y="225">Rule match</text>
<text class="small" x="498" y="245">Severity assigned</text>
<text class="small" x="498" y="265">Alert emitted</text>
<path class="line" d="M730 215 C790 215, 810 215, 870 215"/>
<rect class="card" x="870" y="160" width="260" height="110" rx="18"/>
<circle class="yellow" cx="898" cy="190" r="8"/>
<text class="label" x="918" y="196">n8n validation</text>
<text class="small" x="898" y="225">Payload received</text>
<text class="small" x="898" y="245">Fields normalized</text>
<text class="small" x="898" y="265">Decision branch selected</text>
<path class="line" d="M1000 270 C1000 350, 865 365, 765 390"/>
<rect class="card2" x="610" y="375" width="260" height="110" rx="18"/>
<circle class="green" cx="638" cy="405" r="8"/>
<text class="label" x="658" y="411">Threat enrichment</text>
<text class="small" x="638" y="440">Hash lookup</text>
<text class="small" x="638" y="460">Verdict returned</text>
<text class="small" x="638" y="480">Context added</text>
<path class="line" d="M1130 215 C1190 215, 1200 215, 1235 215"/>
<rect class="card" x="1010" y="410" width="250" height="110" rx="18"/>
<circle class="accent" cx="1038" cy="440" r="8"/>
<text class="label" x="1058" y="446">Jira result</text>
<text class="small" x="1038" y="475">Ticket generated for high-risk events</text>
<text class="small" x="1038" y="495">Low-risk events filtered</text>
<text class="tiny" x="70" y="590">Test cases covered high-severity alerts, malicious hash enrichment and low-priority event suppression.</text>
</svg>
