<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="720" viewBox="0 0 1300 720" role="img" aria-label="SIEM SOAR architecture diagram">
<style>
  .bg { fill:#0b1020; }
  .card { fill:#111827; stroke:#334155; stroke-width:1.5; rx:18; }
  .card2 { fill:#0f172a; stroke:#475569; stroke-width:1.3; rx:16; }
  .title { fill:#f8fafc; font-family:Inter,Arial,sans-serif; font-size:26px; font-weight:700; }
  .subtitle { fill:#cbd5e1; font-family:Inter,Arial,sans-serif; font-size:15px; }
  .label { fill:#f8fafc; font-family:Inter,Arial,sans-serif; font-size:18px; font-weight:700; }
  .small { fill:#cbd5e1; font-family:Inter,Arial,sans-serif; font-size:13px; }
  .tiny { fill:#94a3b8; font-family:Inter,Arial,sans-serif; font-size:12px; }
  .accent { fill:#38bdf8; }
  .green { fill:#22c55e; }
  .yellow { fill:#f59e0b; }
  .red { fill:#ef4444; }
  .line { stroke:#38bdf8; stroke-width:3; fill:none; marker-end:url(#arrow); }
  .line2 { stroke:#94a3b8; stroke-width:2; fill:none; marker-end:url(#arrow2); stroke-dasharray:6 6; }
  .boundary { fill:none; stroke:#64748b; stroke-width:1.5; stroke-dasharray:8 8; rx:20; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/></marker>
  <marker id="arrow2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
</defs>
<rect class="bg" x="0" y="0" width="1300" height="720"/>
<text class="title" x="50" y="55">SIEM + SOAR security operations automation architecture</text>
<text class="subtitle" x="50" y="82">Endpoint telemetry is collected by Wazuh, normalized in n8n, enriched with threat intelligence, then converted into actionable Jira tickets.</text>

<rect class="boundary" x="35" y="120" width="355" height="470" rx="22"/>
<text class="tiny" x="55" y="150">Monitored environment</text>
<rect class="card2" x="70" y="185" width="270" height="105" rx="18"/>
<circle class="accent" cx="98" cy="215" r="8"/>
<text class="label" x="118" y="221">Windows endpoint</text>
<text class="small" x="98" y="250">Sysmon telemetry</text>
<text class="small" x="98" y="270">Process, file and security events</text>
<path class="line" d="M340 240 C420 240, 420 240, 485 240"/>
<rect class="card" x="485" y="170" width="280" height="140" rx="18"/>
<circle class="green" cx="513" cy="200" r="8"/>
<text class="label" x="533" y="206">Wazuh stack</text>
<text class="small" x="513" y="235">Agent forwards endpoint events</text>
<text class="small" x="513" y="255">Manager analyzes rules and severity</text>
<text class="small" x="513" y="275">Indexer/dashboard stores and displays alerts</text>
<path class="line" d="M765 240 C835 240, 845 240, 905 240"/>
<rect class="card" x="905" y="170" width="290" height="140" rx="18"/>
<circle class="yellow" cx="933" cy="200" r="8"/>
<text class="label" x="953" y="206">n8n SOAR workflow</text>
<text class="small" x="933" y="235">Webhook receives JSON alert</text>
<text class="small" x="933" y="255">Normalization maps key fields</text>
<text class="small" x="933" y="275">Decision gates route events</text>
<path class="line" d="M1050 310 C1050 365, 945 385, 875 410"/>
<rect class="card2" x="735" y="385" width="260" height="115" rx="18"/>
<circle class="red" cx="763" cy="415" r="8"/>
<text class="label" x="783" y="421">VirusTotal API</text>
<text class="small" x="763" y="450">File hash enrichment</text>
<text class="small" x="763" y="470">Malicious verdict scoring</text>
<path class="line" d="M1195 240 C1230 240, 1240 240, 1265 240"/>
<path class="line" d="M995 440 C1090 470, 1130 430, 1195 385"/>
<rect class="card" x="1015" y="365" width="250" height="125" rx="18"/>
<circle class="accent" cx="1043" cy="395" r="8"/>
<text class="label" x="1063" y="401">Jira service desk</text>
<text class="small" x="1043" y="430">Critical and malicious alerts</text>
<text class="small" x="1043" y="450">Prioritized analyst queue</text>
<text class="small" x="1043" y="470">Investigation-ready ticket context</text>
<rect class="boundary" x="435" y="120" width="815" height="470" rx="22"/>
<text class="tiny" x="455" y="150">Security operations lab</text>
<text class="tiny" x="50" y="665">Sanitized portfolio diagram. No production identifiers, credentials, or client data are included.</text>
</svg>
